steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/zynroses:$COMMIT_SHA'
      - .
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/zynroses:$COMMIT_SHA'
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - zynroses
      - --image
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/zynroses:$COMMIT_SHA'
      - --region
      - europe-west1
      - --platform
      - managed
      - --port
      - '3000'
      - --allow-unauthenticated
options:
  logging: CLOUD_LOGGING_ONLY
images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/zynroses:$COMMIT_SHA'
