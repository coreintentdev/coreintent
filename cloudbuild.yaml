# Cloud Build config for CoreIntent → Cloud Run
# Project: coreintent.dev / Zynthio Trading Engine
# Uses high-CPU machine to burn trial credits efficiently
#
# Trigger manually:
#   gcloud builds submit --config cloudbuild.yaml .
#
# Or connect to GitHub for auto-deploy on push.

steps:
  # Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/coreintent:$COMMIT_SHA"
      - "-t"
      - "gcr.io/$PROJECT_ID/coreintent:latest"
      - "--cache-from"
      - "gcr.io/$PROJECT_ID/coreintent:latest"
      - "."

  # Push to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/coreintent:$COMMIT_SHA"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/coreintent:latest"

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "coreintent"
      - "--image"
      - "gcr.io/$PROJECT_ID/coreintent:$COMMIT_SHA"
      - "--region"
      - "europe-west1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--port"
      - "8080"
      - "--memory"
      - "512Mi"
      - "--cpu"
      - "1"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "2"

images:
  - "gcr.io/$PROJECT_ID/coreintent:$COMMIT_SHA"
  - "gcr.io/$PROJECT_ID/coreintent:latest"

options:
  machineType: "E2_HIGHCPU_32"
  logging: CLOUD_LOGGING_ONLY

timeout: "1200s"
